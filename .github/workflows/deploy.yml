name: Deploy to Vercel

on:
  push:
    branches: [claude/setup-app-hosting-Ktkzh, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: stable
          cache: false

      - name: Install dependencies
        working-directory: App/travel_app
        run: flutter pub get

      - name: Build web
        working-directory: App/travel_app
        run: flutter build web --release --pwa-strategy=none --web-renderer html

      - name: Add Vercel SPA routing config
        run: |
          echo '{"version":2,"buildCommand":"","outputDirectory":".","routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > App/travel_app/build/web/vercel.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          cp -r App/travel_app/build/web /tmp/vercel-deploy
          cd /tmp/vercel-deploy
          vercel deploy . --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
