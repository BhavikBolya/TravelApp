name: Deploy to Vercel

on:
  push:
    branches: [claude/setup-app-hosting-Ktkzh, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12'
          channel: stable
          cache: false

      - name: Install dependencies
        working-directory: App/travel_app
        run: flutter pub get

      - name: Build web
        working-directory: App/travel_app
        run: flutter build web --release

      - name: Add Vercel SPA routing config
        run: |
          echo '{"rewrites":[{"source":"/(.*)","destination":"/index.html"}]}' > App/travel_app/build/web/vercel.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: App/travel_app/build/web
        run: vercel deploy . --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
